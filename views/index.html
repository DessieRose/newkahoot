<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/index.css" />
    <title>Join Game | newKahoot</title>
  </head>
  <body class="player-join-screen">
    <main class="login-container">
      <div class="login-card">
        <div class="icon-header">
          <span class="game-icon">🎮</span>
        </div>
        <h1>newKahoot</h1>
        <p class="p_index">Enter your nickname to join the lobby.</p>

        <form id="join-form">
          <div class="input-group">
            <input
              type="text"
              placeholder="Nickname"
              name="name"
              id="name"
              required
              maxlength="10"
            />
          </div>
          <p id="error-message" class="error-hidden"></p>
          <button class="btn-index" type="submit" id="submit" class="btn-login">
            Join Game
          </button>
        </form>
      </div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      const errorDisplay = document.getElementById("error-message");
      const nicknameInput = document.getElementById("name");
      const formId = document.getElementById("your-form-id");
      const socket = io();
      const form = document.getElementById("join-form");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const nickname = document.getElementById("name").value;

        socket.emit("checkName", nickname, (available) => {
          if (available) {
            window.location.href = `/game?name=${encodeURIComponent(nickname)}`;
          } else {
            errorDisplay.innerText = "⚠️ This nickname is already taken!";
            errorDisplay.className = "error-text";
          }
        });
      });
    </script>
  </body>
</html>
