<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/styles/game.css" />
    <title>Game | newKahoot</title>
  </head>
  <body>
    <div id="lobby-screen">
      <h1>Lobby</h1>
      <p>⏳ Waiting for the host to start the game...</p>
      <div class="loader"></div>

      <div id="bubble-container"></div>
    </div>

    <div id="game-screen" class="hidden">
      <h2 id="question-text">Question will appear here</h2>
      <div id="answer-options"></div>
    </div>

    <div id="winner-screen" class="hidden">
      <h1>🏆 Winners! 🏆</h1>
      <div id="leaderboard"></div>
      <button onclick="location.href = '/'">Play Again</button>
    </div>

    <ul></ul>
  </body>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    const socket = io("http://localhost:3000");

    socket.on("connect", () => {
      if (name) {
        socket.emit("joinGame", name);
      }
    });

    // socket.on("updateUsers", (users) => {
    //   const ul = document.querySelector("ul");
    //   ul.innerHTML = users.map((name) => `<li>${name}</li>`).join("");
    // });

    socket.on("personalWelcome", (name) => {
      const display = document.getElementById("player-name-display");
      if (display) display.innerText = name;
      // document.getElementById('player-name-display').innerText = name;
    });

    socket.on("updateUsers", (users) => {
      const container = document.getElementById("bubble-container");
      container.innerHTML = "";

      users.forEach((userName) => {
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = userName;

        const randomTop = Math.floor(Math.random() * 70) + 10;
        const randomLeft = Math.floor(Math.random() * 80) + 10;

        bubble.style.top = randomTop + "%";
        bubble.style.left = randomLeft + "%";

        bubble.style.animationDelay = Math.random() * 5 + "s";

        container.appendChild(bubble);
      });
    });

    socket.on("newQuestion", (question) => {
      console.log("📝 Received question:", question);

      // Display the question
      document.getElementById("question-text").innerText = question.question;

      // Display the answer options
      const optionsContainer = document.getElementById("answer-options");
      optionsContainer.innerHTML = "";

      question.answers.forEach((answer, index) => {
        const button = document.createElement("button");
        button.innerText = answer.text;
        button.className = "answer-btn";
        button.onclick = () => {
          socket.emit("submitAnswer", answer);
          document
            .querySelectorAll(".answer-btn")
            .forEach((btn) => (btn.disabled = true));
        };
        optionsContainer.appendChild(button);
      });
    });

    socket.on("gameStarted", () => {
      document.getElementById("lobby-screen").classList.add("hidden");
      document.getElementById("game-screen").classList.remove("hidden");
    });

    socket.on("reloadPage", () => {
      window.location.reload();
    });

    socket.on("gameEnd", (leaderboard) => {
      // Hide game screen
      document.getElementById("game-screen").classList.add("hidden");
      // Show winner screen
      document.getElementById("winner-screen").classList.remove("hidden");

      const board = document.getElementById("leaderboard");
      board.innerHTML = leaderboard
        .map(
          (player, index) => `
          <div class="winner-row ${index === 0 ? "first-place" : ""}">
              <span>${index + 1}. ${player[1].name}</span>
              <span>${player[1].score} pts</span>
          </div>
      `,
        )
        .join("");
    });
  </script>
</html>
